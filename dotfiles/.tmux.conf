# Prefix (lasciamo Ctrl+b)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Migliora tempo risposta
set -s escape-time 0

# Numerazione finestre da 1 (non da 0)
set -g base-index 1
setw -g pane-base-index 1

# Muoversi tra finestre con 1–9 (niente 0)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Reload config veloce
bind r source-file ~/.tmux.conf \; display "Config ricaricata!"

# Split più comodi (senza Shift)
bind | split-window -h
bind - split-window -v

# Navigazione tra pane con hjkl (stile vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize pane veloce
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Abilita mouse (molto utile)
set -g mouse on
